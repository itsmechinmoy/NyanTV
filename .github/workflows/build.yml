name: Build & Release Android (NyanTV)
on:
  push:
    tags:
      - "v*"
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'github_assets/**'
      - 'repo/**'
      - 'scripts/**'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE.md'
  workflow_dispatch:

jobs:
  # ============================================================
  # Build job
  # ============================================================
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: arm64-v8a
          - label: armeabi-v7a

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/nyantv.jks

      - name: Start Build Timer
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Build APK (${{ matrix.label }})
        run: |
          ./gradlew assembleRelease \
            -PABI_FILTER="${{ matrix.label }}" \
            -PKEYSTORE_PATH="nyantv.jks" \
            -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PANILIST_CLIENT_ID="${{ secrets.AL_CLIENT_ID }}" \
            -PANILIST_CLIENT_SECRET="${{ secrets.AL_CLIENT_SECRET }}" \
            -PMAL_CLIENT_ID="${{ secrets.MAL_CLIENT_ID }}" \
            -PMAL_CLIENT_SECRET="${{ secrets.MAL_CLIENT_SECRET }}" \
            -PSIMKL_CLIENT_ID="${{ secrets.SIMKL_CLIENT_ID }}" \
            -PSIMKL_CLIENT_SECRET="${{ secrets.SIMKL_CLIENT_SECRET }}"

      - name: Rename APK
        run: |
          cd app/build/outputs/apk/release
          mv app-release.apk NyanTV-Android-${{ matrix.label }}.apk

      - name: Calculate Build Stats
        run: |
          BUILD_END=$(date +%s)
          BUILD_TIME=$((BUILD_END - BUILD_START))
          APK_SIZE=$(du -h app/build/outputs/apk/release/NyanTV-Android-${{ matrix.label }}.apk | cut -f1)
          echo "BUILD_TIME_DISPLAY=$((BUILD_TIME/60))m $((BUILD_TIME%60))s" >> $GITHUB_ENV
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NyanTV-Android-${{ matrix.label }}
          path: app/build/outputs/apk/release/NyanTV-Android-${{ matrix.label }}.apk
          retention-days: 1

      - name: Write Build Summary
        run: |
          echo "### ${{ matrix.label }}" >> $GITHUB_STEP_SUMMARY
          echo "⏱️ Build Time: ${{ env.BUILD_TIME_DISPLAY }}" >> $GITHUB_STEP_SUMMARY
          echo "📦 APK Size: ${{ env.APK_SIZE }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # Release job
  # ============================================================
  release:
    runs-on: ubuntu-latest
    needs: build-android

    steps:
      - name: Download arm64-v8a APK
        uses: actions/download-artifact@v4
        with:
          name: NyanTV-Android-arm64-v8a
          path: apks/

      - name: Download armeabi-v7a APK
        uses: actions/download-artifact@v4
        with:
          name: NyanTV-Android-armeabi-v7a
          path: apks/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apks/*.apk
          generate_release_notes: true
          body: |
            ## 📦 Downloads
            | APK | Compatible Devices |
            |-----|--------------------|
            | `NyanTV-Android-arm64-v8a.apk` | Nvidia Shield TV (2015), Shield TV Pro (2015–2019) |
            | `NyanTV-Android-armeabi-v7a.apk` | Everything else — Fire TV, Chromecast, Google TV Streamer, Onn, TiVo, Shield TV Tube (2019) |

            > **Not sure which to pick?** Use `armeabi-v7a` — it works on all devices.

            ## 🚀 Build Stats
            - 🏗️ **Build Number:** `${{ github.run_number }}`
            - 🔖 **Tag:** `${{ github.ref_name }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}